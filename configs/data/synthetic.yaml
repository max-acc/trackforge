# ----------------------------------------------------------------------------------------------------------------------
# Configuration data for synthetic data generation.
# ----------------------------------------------------------------------------------------------------------------------

default:
  name: "Synthetic Data Generation"

# event data
event:
  num_events:     500
  num_tracks:     20
  num_tracks_dev: [-0.1, 0.1]
  noise_hits:     5
  noise_hits_dev: [-1, 1]

# detector geometry
detector:
  z_positions: [10.0, 25.0, 50.0, 80.0, 130.0, 200.0]
  disk_r_range: [10.0, 300.0]

# track geometry
track:
  radius_mean: 50.0
  radius_std: 28.0
  noise_sd: [0.1, 0.1]  # noise standard deviation in x and y direction

# helix geometry
helix:
  scale: 0.5     # control curvature strength, e.g. magnetic field
  min_radius: 5.0