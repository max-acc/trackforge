# ----------------------------------------------------------------------------------------------------------------------
# Configuration data for synthetic data generation.
# ----------------------------------------------------------------------------------------------------------------------

default:
  name: "Synthetic Data Generation"

# event data
event:
  num_events:     200
  num_tracks:     80
  num_tracks_dev: [-20, 30]
  noise_hits:     10
  noise_hits_dev: [-1, 1]

# detector geometry
detector:
  z_positions: [10.0, 25.0, 50.0, 80.0, 130.0, 200.0]
  disk_r_range: [10.0, 300.0]

# track geometry
track:
  radius_mean: 50.0
  radius_std: 28.0
  noise_sd: [1.2, 1.2]  # noise standard deviation in x and y direction

# helix geometry
helix:
  scale: 10.0     # control curvature strength, e.g. magnetic field
  min_radius: 5.0